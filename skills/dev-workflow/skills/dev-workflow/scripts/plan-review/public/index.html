<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plan Review — dev-workflow</title>

  <!-- highlight.js theme (cdnjs, pinned + SRI) -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css"
    integrity="sha512-0aPQyyeZrWj9sCA46UlmWgKOP0mUipLQ6OZXu8l4IcAmD2u31EPEy9VcIMvl7SoAaKe8bLXZhYoMaE/in+gcgA=="
    crossorigin="anonymous" referrerpolicy="no-referrer">

  <!-- marked (UMD) + highlight.js (UMD): classic scripts run before the deferred module below,
       so window.marked / window.hljs are ready when the render logic runs. -->
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/marked/16.3.0/lib/marked.umd.min.js"
    integrity="sha512-V6rGY7jjOEUc7q5Ews8mMlretz1Vn2wLdMW/qgABLWunzsLfluM0FwHuGjGQ1lc8jO5vGpGIGFE+rTzB+63HdA=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"
    integrity="sha512-EBLzUL8XLl+va/zAsmXwS7Z2B1F9HUHkZwyS/VKwh3S7T/U0nF4BaU29EP/ZSf6zgiIxYAnKLu6bJ8dqpmX5uw=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <style>
    :root {
      --fg: #1f2328;
      --muted: #59636e;
      --border: #d1d9e0;
      --accent: #0969da;
      --bg: #ffffff;
      --bg-soft: #f6f8fa;
      --approve: #1a7f37;
      --revise: #bc4c00;
      --rec: var(--approve);
      --risk: var(--revise);
      /* diff "changed" accent — amber, deliberately distinct from --accent (blue,
         the base decision-card border), --approve (green), and --revise (orange) */
      --changed: #9a6700;
      --changed-bg: #fff8c5;
      --bar-h: 64px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", Meiryo, sans-serif;
      color: var(--fg);
      background: var(--bg);
      line-height: 1.7;
    }
    #app {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 28px;
      max-width: 1120px;
      margin: 0 auto;
      padding: 20px 24px calc(var(--bar-h) + 32px);
    }
    /* summary header */
    header.plan-head {
      grid-column: 1 / -1;
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px;
      margin-bottom: 4px;
    }
    header.plan-head .eyebrow { color: var(--muted); font-size: 12px; letter-spacing: .04em; text-transform: uppercase; }
    header.plan-head h1 { font-size: 20px; margin: 2px 0 10px; line-height: 1.4; }
    header.plan-head h1 code { font-size: 0.9em; }
    #plan-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      display: inline-flex; align-items: baseline; gap: 6px;
      font-size: 12px; color: var(--fg);
      background: var(--bg-soft); border: 1px solid var(--border);
      border-radius: 999px; padding: 3px 12px;
    }
    .chip b { color: var(--muted); font-weight: 600; }
    .chip.risk { background: #fff4ec; border-color: #f0c0a0; color: var(--risk); }
    .chip.risk b { color: var(--risk); }
    /* Scope is descriptive prose, not an enum — give it a labeled meta row that wraps,
       instead of cramming it into a fixed-shape pill like Difficulty / Risks */
    #plan-scope { margin-top: 8px; }
    .meta-scope { display: flex; gap: 8px; align-items: baseline; font-size: 12px; line-height: 1.5; }
    .meta-scope .meta-label {
      flex: none; font-size: 10px; font-weight: 700; letter-spacing: .04em;
      text-transform: uppercase; color: var(--muted); padding-top: 2px;
    }
    .meta-scope .meta-val { color: var(--fg); min-width: 0; }
    /* section nav */
    #toc {
      position: sticky; top: 16px; align-self: start;
      max-height: calc(100vh - 32px); overflow: auto;
      font-size: 13px; border-right: 1px solid var(--border); padding-right: 14px;
    }
    #toc .toc-title { font-weight: 600; color: var(--muted); margin-bottom: 8px; }
    #toc a { display: block; color: var(--muted); text-decoration: none; padding: 3px 0; }
    #toc a:hover { color: var(--accent); }
    /* main */
    main#plan { min-width: 0; }
    .preamble { color: var(--muted); font-size: 13px; margin: 0 0 12px; }
    .preamble blockquote { border-left: 3px solid var(--border); margin: 0; padding: 2px 12px; }
    details.section {
      border: 1px solid var(--border); border-radius: 10px;
      margin: 12px 0; padding: 0 16px; background: var(--bg);
    }
    details.section[open] { padding-bottom: 8px; }
    details.section > summary {
      cursor: pointer; list-style: none; padding: 12px 0;
      display: flex; align-items: center; gap: 10px; font-weight: 600;
    }
    details.section > summary::-webkit-details-marker { display: none; }
    details.section > summary::before {
      content: "▸"; color: var(--muted); font-size: 12px; transition: transform .12s;
    }
    details.section[open] > summary::before { transform: rotate(90deg); }
    /* Context = the "why" framing; tint it so it reads as lead context, not a structural section */
    details.section.is-context { background: var(--bg-soft); border-color: #c9d3dd; }
    details.section.is-context > summary .sec-title { color: var(--muted); }
    details.section.is-context .sec-body { color: #2b333b; }
    .sec-title { font-size: 15px; }
    .badge {
      font-size: 11px; font-weight: 700; border-radius: 999px;
      padding: 1px 8px; background: var(--bg-soft); color: var(--muted);
    }
    .badge-risk { background: #fff4ec; color: var(--risk); }
    .sec-body { padding-top: 2px; }
    .sec-body > :first-child { margin-top: 4px; }
    .sec-body h1 { font-size: 20px; }
    .sec-body h2 { font-size: 17px; }
    .sec-body h3, .sec-body h4 { font-size: 14px; }
    .sec-body pre {
      background: var(--bg-soft); border: 1px solid var(--border);
      border-radius: 6px; padding: 12px; overflow: auto;
    }
    .sec-body code:not(pre code) {
      background: var(--bg-soft); border-radius: 4px; padding: 1px 5px; font-size: 0.9em;
    }
    .sec-body table { border-collapse: collapse; }
    .sec-body th, .sec-body td { border: 1px solid var(--border); padding: 4px 10px; }
    .sec-body .mermaid { background: var(--bg); text-align: center; margin: 10px 0; }
    .sec-body blockquote { border-left: 3px solid var(--border); margin: 8px 0; padding: 0 12px; color: var(--muted); }
    /* decision cards */
    .decision-card {
      border: 1px solid var(--border); border-left: 3px solid var(--accent);
      border-radius: 8px; padding: 10px 14px; margin: 10px 0; background: var(--bg);
    }
    .decision-card.switched { border-left-color: var(--revise); background: #fffaf6; }
    .dc-q { font-weight: 600; margin-bottom: 8px; }
    .dc-q .dc-tag {
      display: inline-block; font-size: 11px; font-weight: 700; color: #fff;
      background: var(--accent); border-radius: 4px; padding: 1px 7px; margin-right: 6px; vertical-align: 1px;
    }
    .decision-card.switched .dc-q .dc-tag { background: var(--revise); }
    .dc-rec, .dc-alt { font-size: 14px; border-radius: 6px; padding: 6px 10px; margin: 6px 0; }
    .dc-rec { background: #eaf6ee; border: 1px solid #b4ddc0; }
    .dc-alt { background: var(--bg-soft); border: 1px solid var(--border); color: var(--muted); }
    .decision-card.switched .dc-rec { background: var(--bg-soft); border-color: var(--border); color: var(--muted); }
    .decision-card.switched .dc-alt { background: #fff0e6; border-color: #f0c0a0; color: var(--fg); }
    .dc-rec > :first-child, .dc-alt > :first-child { margin-top: 2px; }
    .dc-rec > :last-child, .dc-alt > :last-child { margin-bottom: 2px; }
    .dc-label {
      display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: .04em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 2px;
    }
    .dc-rec .dc-label { color: var(--rec); }
    .dc-toggle { display: flex; gap: 14px; margin: 8px 0 2px; font-size: 13px; }
    .dc-toggle label { display: inline-flex; align-items: center; gap: 5px; cursor: pointer; color: var(--muted); }
    .dc-toggle label:has(input:checked) { color: var(--fg); font-weight: 600; }
    /* comment affordances */
    /* Highlight the block under the cursor so the comment target's extent is obvious — the
       per-element comment model treats each paragraph / list item as its own target. The tint
       is a step deeper than --bg-soft so it stays visible inside the tinted Context section too. */
    .commentable { position: relative; border-radius: 6px; transition: background .12s; }
    .commentable:hover { background: #e8edf3; }
    .cbtn {
      position: absolute; top: 0; right: -2px; opacity: 0;
      font-size: 12px; line-height: 1; border: 1px solid var(--border);
      background: var(--bg); border-radius: 6px; padding: 2px 6px; cursor: pointer;
      transition: opacity .1s;
    }
    .commentable:hover > .cbtn, .cbtn.has-comment { opacity: 1; }
    .cbtn.has-comment { border-color: var(--revise); }
    .comment-btn {
      font-size: 12px; color: var(--muted); background: none;
      border: 1px solid var(--border); border-radius: 6px; padding: 2px 10px; cursor: pointer; margin-top: 6px;
    }
    .comment-btn:hover { color: var(--accent); border-color: var(--accent); }
    .comment-btn.has-comment { color: var(--revise); border-color: var(--revise); font-weight: 600; }
    .comment-input {
      display: block; width: 100%; min-height: 56px; margin: 6px 0 8px; padding: 8px;
      font: inherit; font-size: 13px; border: 1px solid var(--accent); border-radius: 6px; resize: vertical;
    }
    .comment-input[hidden] { display: none; } /* the `display: block` above otherwise defeats the `hidden` attribute */
    /* diff mode: surfaced only on a revise re-launch (prevMarkdown present).
       Badges + highlights mark what changed since the user's previous review,
       so unchanged sections can stay collapsed and the eye goes to the edits. */
    #diff-banner {
      grid-column: 1 / -1; margin: 6px 0 0; padding: 8px 12px;
      background: var(--changed-bg); border: 1px solid #eac54f; border-radius: 8px;
      font-size: 13px; color: #6f4e00;
    }
    .badge-diff { background: var(--changed-bg); color: var(--changed); }
    /* changed block: inset left bar + faint tint; box-shadow survives the
       .commentable:hover background swap so the marker stays visible on hover.
       Amber (--changed), not blue, so it never reads as the base card border. */
    .commentable.block-changed { background: var(--changed-bg); box-shadow: inset 3px 0 0 0 var(--changed); }
    /* changed decision card: a thick amber left bar + faint amber wash, replacing
       the base blue (--accent) left border, so "this Decision changed" reads at a
       glance (far more legible than a thin outline). Scoped :not(.switched) so a
       card toggled to its alternative still shows the orange .switched styling —
       the active user action wins over the historical diff mark. */
    .decision-card.card-changed:not(.switched) {
      border-left: 5px solid var(--changed);
      background: var(--changed-bg);
    }
    /* sticky decision bar */
    #bar {
      position: fixed; left: 0; right: 0; bottom: 0; height: var(--bar-h);
      display: flex; align-items: center; gap: 16px; padding: 0 24px;
      background: var(--bg); border-top: 1px solid var(--border); box-shadow: 0 -2px 8px rgba(0,0,0,0.04);
    }
    #bar .decision { display: flex; gap: 8px; }
    #bar label.choice {
      display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 14px;
    }
    #bar label.choice:has(input:checked).approve { border-color: var(--approve); color: var(--approve); font-weight: 600; }
    #bar label.choice:has(input:checked).revise { border-color: var(--revise); color: var(--revise); font-weight: 600; }
    #bar .spacer { flex: 1; }
    #bar .count { color: var(--muted); font-size: 13px; }
    /* keyboard-shortcut hint: the decision bar's native controls drop out of Tab
       order when macOS Full Keyboard Access is off (Chrome mirrors that setting),
       so the a/r/↵ shortcuts are the reliable keyboard path — surface them here. */
    #bar .kbd-hint { color: var(--muted); font-size: 12px; }
    #bar .kbd-hint kbd {
      font: inherit; background: var(--bg-soft); border: 1px solid var(--border);
      border-radius: 4px; padding: 0 5px;
    }
    #send-btn {
      font-size: 14px; font-weight: 600; color: #fff; background: var(--accent);
      border: none; border-radius: 8px; padding: 8px 20px; cursor: pointer;
    }
    #send-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
    #status { color: var(--revise); font-size: 13px; }
    #done { grid-column: 1 / -1; text-align: center; padding: 40px; font-size: 16px; color: var(--approve); }
    #app.submitted main#plan, #app.submitted #toc { opacity: 0.5; pointer-events: none; }
  </style>
</head>
<body>
  <div id="app">
    <header class="plan-head">
      <div class="eyebrow">Plan Review — <span id="plan-id">…</span></div>
      <h1 id="plan-title">…</h1>
      <div id="plan-chips"></div>
      <div id="plan-scope" class="meta-scope" hidden></div>
      <div id="diff-banner" hidden></div>
    </header>
    <nav id="toc"><div class="toc-title">Sections</div></nav>
    <main id="plan"></main>
    <div id="done" hidden>Submitted. Return to your terminal.</div>
  </div>

  <div id="bar">
    <div class="decision" role="radiogroup" aria-label="Plan decision">
      <label class="choice approve"><input type="radio" class="decision-radio" name="decision-approve" value="approve"> Approve</label>
      <label class="choice revise"><input type="radio" class="decision-radio" name="decision-revise" value="revise"> Request changes</label>
    </div>
    <span class="count">Comments: <span id="comment-count">0</span></span>
    <span class="kbd-hint" id="kbd-hint"></span>
    <span class="spacer"></span>
    <span id="status"></span>
    <button id="send-btn" type="button" disabled>Send to Claude</button>
  </div>

  <script type="module">
    import mermaid from "https://esm.sh/mermaid@11.15.0";

    mermaid.initialize({ startOnLoad: false, theme: "default", securityLevel: "strict" });

    // comments: id -> { text, excerpt } ; switches: id -> excerpt
    const state = { decision: null, comments: new Map(), switches: new Map() };
    let SWITCH_MSG = "Switch this decision to its Alternative";
    // localized keyboard-shortcut hint — static developer-controlled markup (assigned
    // via innerHTML in init, like SWITCH_MSG); never holds user data, so not an XSS vector
    let KBD_HINT = "<kbd>a</kbd> approve · <kbd>r</kbd> request changes · <kbd>⌘/Ctrl+↵</kbd> send";

    // diff mode (revise re-launch): populated by buildDiff() when prevMarkdown is present.
    //   sectionStatus:    id -> "new" | "changed" | "unchanged"
    //   prevBlockTexts:   id -> Set<normalized block text>        (changed sections only)
    //   prevDecisionSigs: id -> Set<normalized decision signature> (changed Decisions sections only)
    const diff = { active: false, sectionStatus: new Map(), prevBlockTexts: new Map(), prevDecisionSigs: new Map(), changedCount: 0, removedCount: 0 };
    // localized diff-banner text (set from `lang` in init, like SWITCH_MSG); the
    // "Changed" / "New" badges stay English UI chrome and are not localized.
    let DIFF_BANNER = (n, removed) => `🔍 ${n} section${n === 1 ? "" : "s"} changed or added since your last review${removed ? `, ${removed} removed` : ""} — changes highlighted below`;
    let DIFF_BANNER_NONE = "🔍 No section changes since your last review";

    const md = (t) => window.marked.parse(t || "");
    const mdInline = (t) => window.marked.parseInline(t || "");
    const stripMd = (t) => (t || "").replace(/[*`]/g, "").trim();
    const normText = (t) => (t || "").replace(/\s+/g, " ").trim();
    const excerptOf = (t) => normText(t).slice(0, 40);
    const HTML_ESCAPES = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" };
    const escapeHtml = (t) => (t || "").replace(/[&<>"]/g, (c) => HTML_ESCAPES[c]);

    const FENCE_RE = /^\s*(`{3,}|~{3,})/;

    // Block-level tags that are commentable as whole blocks (UL/OL → per-LI and
    // TABLE → wrapped are handled separately). Shared by attachElementComments
    // (renders comment affordances) and collectBlockTexts (read-only diff text),
    // so the two stay in sync.
    const COMMENT_BLOCK_TAGS = ["P", "BLOCKQUOTE", "PRE", "H4", "H5", "H6"];

    // What the viewer knows about each plan section, in match-priority order:
    // `match` lists title prefixes (lowercased) that map to the type; `open` opens
    // the section by default. The Decisions/Risks render paths key off `type` below.
    const SECTION_TYPES = [
      { type: "overview", match: ["overview"], open: true },
      { type: "decisions", match: ["decision"], open: true },
      { type: "design", match: ["design"] },
      { type: "test", match: ["test plan", "test"] },
      { type: "risks", match: ["risk", "unknown"] },
      { type: "context", match: ["context"], open: true },
    ];
    const OPEN_TYPES = new Set(SECTION_TYPES.filter((s) => s.open).map((s) => s.type));

    function classify(title) {
      const t = title.toLowerCase().replace(/\s+/g, " ").trim();
      const hit = SECTION_TYPES.find((s) => s.match.some((m) => t.startsWith(m)));
      return hit ? hit.type : "other";
    }

    function slugify(title) {
      return (title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "")) || "section";
    }

    // Split the plan into level-3 (###) sections, tracking fenced code so a ### inside a
    // code block is not mistaken for a heading. Content before the first ### is the preamble.
    function parseSections(markdown) {
      const lines = markdown.split(/\r?\n/);
      const sections = [];
      const preamble = [];
      let cur = null;
      let inFence = false;
      const seen = {};
      for (const line of lines) {
        if (FENCE_RE.test(line)) inFence = !inFence;
        const h = !inFence && /^###\s+(.+?)\s*$/.exec(line);
        if (h) {
          const title = h[1];
          const base = slugify(title);
          let id = base, n = 1;
          while (seen[id]) id = `${base}-${++n}`; // probe until unused so "Design 2" can't collide with a 2nd "Design"
          seen[id] = 1;
          cur = { title, type: classify(title), id, lines: [] };
          sections.push(cur);
          continue;
        }
        if (cur) cur.lines.push(line);
        else preamble.push(line);
      }
      for (const s of sections) s.body = s.lines.join("\n").trim();
      return { preamble: preamble.join("\n").trim(), sections };
    }

    function fieldValue(body, label) {
      const re = new RegExp("\\*\\*" + label + "\\*\\*\\s*[:：]\\s*(.*)");
      for (const line of body.split("\n")) {
        const m = re.exec(line);
        if (m) return m[1].trim();
      }
      return "";
    }

    function parseOverview(body) {
      return {
        goal: fieldValue(body, "Goal"),
        difficulty: fieldValue(body, "Difficulty"),
        scope: fieldValue(body, "Scope"),
      };
    }

    function countListItems(body) {
      let inFence = false, n = 0;
      for (const line of (body || "").split("\n")) {
        if (FENCE_RE.test(line)) inFence = !inFence;
        if (!inFence && /^\s{0,1}(?:[-*]|\d+\.)\s+\S/.test(line)) n++;
      }
      return n;
    }

    // Split the Decisions body into items by the **Question** marker; capture each item's
    // question / recommendation / alternative raw text for card rendering.
    function parseDecisions(body) {
      const FIELD_RE = /^\s*(?:[-*]\s+)?\*\*(Question|Recommendation|Alternative)\*\*\s*[:：]?\s*(.*)$/;
      const items = [];
      const preamble = [];
      let cur = null, field = null;
      for (const line of body.split("\n")) {
        const m = FIELD_RE.exec(line);
        if (m) {
          const f = m[1].toLowerCase();
          if (f === "question") {
            cur = { question: m[2] || "", recommendation: "", alternative: "" };
            items.push(cur);
            field = "question";
          } else if (cur) {
            field = f;
            cur[f] = m[2] || "";
          } else {
            preamble.push(line); // stray Recommendation/Alternative before any Question — keep, don't drop
          }
          continue;
        }
        if (cur && field) cur[field] += "\n" + line;
        else if (!cur) preamble.push(line);
      }
      for (const it of items) {
        it.question = it.question.trim();
        it.recommendation = it.recommendation.trim();
        it.alternative = it.alternative.trim();
      }
      return { items, preamble: preamble.join("\n").trim() };
    }

    // --- diff (revise re-launch) ---
    // Read-only mirror of attachElementComments' target selection: collect the
    // normalized text of each commentable block in a section body, WITHOUT the
    // DOM mutation attachElementComments performs (table replaceWith, comment
    // buttons, mermaid/highlight). Used only for prev-vs-current block diffing.
    // Safe to read prev pre-highlight while current blocks are read post-highlight.js:
    // normText collapses all whitespace and highlight.js only wraps tokens in spans
    // (textContent unchanged), so identical source normalizes to the same string.
    function collectBlockTexts(bodyMarkdown) {
      const tmp = document.createElement("div");
      tmp.innerHTML = md(bodyMarkdown);
      const out = new Set();
      for (const c of Array.from(tmp.children)) {
        const tag = c.tagName;
        if (tag === "UL" || tag === "OL") {
          for (const li of Array.from(c.children)) if (li.tagName === "LI") out.add(normText(li.textContent));
        } else if (tag === "TABLE" || COMMENT_BLOCK_TAGS.includes(tag)) {
          out.add(normText(c.textContent));
        }
      }
      return out;
    }

    const decisionSig = (it) => normText(`${it.question} ${it.recommendation} ${it.alternative}`);
    const collectDecisionSigs = (body) => new Set(parseDecisions(body).items.map(decisionSig));

    // Compare current sections against the previous-launch plan; classify each
    // current section new/changed/unchanged and precompute per-section prev block
    // sets for the changed ones. Section identity is the slug id from parseSections.
    function buildDiff(prevMarkdown, sections) {
      const prev = parseSections(prevMarkdown);
      const prevById = new Map(prev.sections.map((s) => [s.id, s]));
      let matched = 0; // current sections that map to a prev section (ids are unique)
      for (const s of sections) {
        const p = prevById.get(s.id);
        if (!p) { diff.sectionStatus.set(s.id, "new"); diff.changedCount++; continue; }
        matched++;
        const changed = normText(s.body) !== normText(p.body);
        diff.sectionStatus.set(s.id, changed ? "changed" : "unchanged");
        if (changed) {
          diff.changedCount++;
          if (s.type === "decisions") diff.prevDecisionSigs.set(s.id, collectDecisionSigs(p.body));
          else diff.prevBlockTexts.set(s.id, collectBlockTexts(p.body));
        }
      }
      diff.removedCount = prev.sections.length - matched; // prev sections with no current counterpart
      diff.active = true;
    }

    // --- comment state ---
    function effectiveComments() {
      const ids = new Set([...state.comments.keys(), ...state.switches.keys()]);
      const out = [];
      for (const id of ids) {
        const switched = state.switches.has(id);
        const c = state.comments.get(id);
        const txt = c ? c.text.trim() : "";
        const excerpt = (c && c.excerpt) || state.switches.get(id) || "";
        let body = switched ? SWITCH_MSG + (txt ? "\n\n" + txt : "") : txt;
        if (body.trim()) out.push({ block: id, excerpt, body });
      }
      return out;
    }

    function onCommentsChanged() {
      const n = effectiveComments().length;
      document.getElementById("comment-count").textContent = String(n);
      if (n > 0 && !state.decision) selectDecision("revise"); // commenting implies a revise
    }

    function setComment(id, text, btn, excerpt) {
      const v = text.trim();
      if (v) state.comments.set(id, { text, excerpt }); else state.comments.delete(id);
      if (btn) btn.classList.toggle("has-comment", Boolean(v));
      onCommentsChanged();
    }

    function setSwitch(id, on, excerpt) {
      if (on) state.switches.set(id, excerpt || ""); else state.switches.delete(id);
      onCommentsChanged();
    }

    function selectDecision(v) {
      state.decision = v;
      // Each decision radio carries a distinct name (so it is its own single-member
      // group — always a Tab stop, never collapsed out when the sibling is checked),
      // so enforce mutual exclusivity here rather than relying on native grouping.
      document.querySelectorAll(".decision-radio").forEach((r) => { r.checked = (r.value === v); });
      document.getElementById("send-btn").disabled = false;
    }

    // --- rendering ---
    function chip(label, value, cls) {
      return `<span class="chip ${cls || ""}"><b>${escapeHtml(label)}</b> ${escapeHtml(value)}</span>`;
    }

    function renderHeader(ov, planId, riskCount) {
      document.getElementById("plan-id").textContent = planId;
      document.getElementById("plan-title").innerHTML = ov.goal ? mdInline(ov.goal) : escapeHtml(planId);
      const chips = [];
      if (ov.difficulty) chips.push(chip("Difficulty", stripMd(ov.difficulty)));
      if (riskCount) chips.push(chip("Risks", String(riskCount), "risk"));
      document.getElementById("plan-chips").innerHTML = chips.join("");
      // Scope is descriptive (often a file list), so render it as a labeled meta row that wraps
      // rather than a fixed-shape pill alongside the short enum chips above.
      const scopeEl = document.getElementById("plan-scope");
      if (ov.scope) {
        scopeEl.innerHTML = `<span class="meta-label">Scope</span><span class="meta-val">${escapeHtml(stripMd(ov.scope))}</span>`;
        scopeEl.hidden = false;
      }
    }

    function renderDiffBanner() {
      if (!diff.active) return;
      const el = document.getElementById("diff-banner");
      el.textContent = diff.changedCount ? DIFF_BANNER(diff.changedCount, diff.removedCount) : DIFF_BANNER_NONE;
      el.hidden = false;
    }

    function renderNav(sections) {
      const toc = document.getElementById("toc");
      if (!sections.length) { toc.hidden = true; return; }
      for (const s of sections) {
        const a = document.createElement("a");
        a.href = `#sec-${s.id}`;
        a.textContent = s.title;
        a.addEventListener("click", () => {
          const det = document.getElementById(`sec-${s.id}`);
          if (det) det.open = true;
        });
        toc.appendChild(a);
      }
    }

    function renderPreamble(preamble, planEl) {
      const kept = preamble.split("\n").filter((l) => !/^##\s/.test(l)).join("\n").trim();
      if (!kept) return;
      const div = document.createElement("div");
      div.className = "preamble";
      div.innerHTML = md(kept);
      planEl.appendChild(div);
    }

    function makeCommentArea(placeholder) {
      const area = document.createElement("textarea");
      area.className = "comment-input";
      area.placeholder = placeholder;
      area.hidden = true;
      return area;
    }

    // Wire a comment button + textarea pair: typing updates the comment state, clicking
    // toggles the textarea. Shared by the decision-card and per-element comment affordances.
    function wireCommentToggle(btn, area, id, excerpt) {
      area.addEventListener("input", () => setComment(id, area.value, btn, excerpt));
      btn.addEventListener("click", (e) => { e.preventDefault(); area.hidden = !area.hidden; if (!area.hidden) area.focus(); });
    }

    function makeFreeComment(id, excerpt, placeholder) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "comment-btn";
      btn.textContent = placeholder;
      const area = makeCommentArea(placeholder + "…");
      wireCommentToggle(btn, area, id, excerpt);
      return { btn, area };
    }

    function renderDecisionCard(it, n) {
      const id = `decision-${n}`;
      const excerpt = excerptOf(it.question);
      const card = document.createElement("div");
      card.className = "decision-card";
      card.dataset.blockId = id;

      const q = document.createElement("div");
      q.className = "dc-q";
      q.innerHTML = `<span class="dc-tag">Decision ${n}</span>${mdInline(it.question)}`;
      card.appendChild(q);

      const rec = document.createElement("div");
      rec.className = "dc-rec";
      rec.innerHTML = `<span class="dc-label">Recommendation</span>${md(it.recommendation)}`;
      card.appendChild(rec);

      if (it.alternative) {
        const alt = document.createElement("div");
        alt.className = "dc-alt";
        alt.innerHTML = `<span class="dc-label">Alternative</span>${md(it.alternative)}`;
        card.appendChild(alt);

        const toggle = document.createElement("div");
        toggle.className = "dc-toggle";
        toggle.innerHTML =
          `<label><input type="radio" name="sw-${n}" value="keep" checked> Keep recommendation</label>` +
          `<label><input type="radio" name="sw-${n}" value="switch"> Switch to alternative</label>`;
        toggle.querySelectorAll("input").forEach((r) =>
          r.addEventListener("change", () => {
            const on = toggle.querySelector("input[value=switch]").checked;
            card.classList.toggle("switched", on);
            setSwitch(id, on, excerpt);
          }),
        );
        card.appendChild(toggle);
      }

      const { btn, area } = makeFreeComment(id, excerpt, "Comment on this decision");
      card.appendChild(btn);
      card.appendChild(area);
      return card;
    }

    // Attach a hover comment affordance to each commentable block element in a rendered body.
    // List items are commentable individually (Design steps / Risks / Test items); paragraphs,
    // code blocks, blockquotes, sub-headings, and tables are commentable as whole blocks.
    // AREA_INSIDE = tags whose textarea is appended *inside* the element (valid flow content);
    // others receive it as a sibling (afterend). DIV is the synthetic table wrapper from below.
    const AREA_INSIDE = new Set(["LI", "BLOCKQUOTE", "DIV"]);
    function attachComment(el, id) {
      el.classList.add("commentable");
      el.dataset.blockId = id;
      const excerpt = excerptOf(el.textContent);
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "cbtn";
      btn.title = "Comment on this";
      btn.textContent = "💬";
      const area = makeCommentArea("Comment on this…");
      wireCommentToggle(btn, area, id, excerpt);
      el.appendChild(btn);
      if (AREA_INSIDE.has(el.tagName)) el.appendChild(area);
      else el.insertAdjacentElement("afterend", area);
    }

    function attachElementComments(bodyEl, sectionId) {
      let n = 0;
      const targets = [];
      for (const c of Array.from(bodyEl.children)) {
        const tag = c.tagName;
        if (tag === "UL" || tag === "OL") {
          for (const li of Array.from(c.children)) if (li.tagName === "LI") targets.push(li);
        } else if (tag === "TABLE") {
          const w = document.createElement("div");
          c.replaceWith(w);
          w.appendChild(c);
          targets.push(w);
        } else if (COMMENT_BLOCK_TAGS.includes(tag)) {
          targets.push(c);
        }
      }
      // prevBlockTexts holds an entry only for a "changed" non-decisions section
      // (see buildDiff), so this lookup alone selects which sections mark blocks: a
      // "new" section relies on its section badge (every block is new), an
      // "unchanged" one has no entry. Read textContent before attachComment appends
      // the 💬 button (which would otherwise pollute it).
      const prevSet = diff.prevBlockTexts.get(sectionId) || null;
      for (const t of targets) {
        if (prevSet && !prevSet.has(normText(t.textContent))) t.classList.add("block-changed");
        attachComment(t, `${sectionId}::${++n}`);
      }
    }

    function renderSection(section) {
      const det = document.createElement("details");
      det.className = "section" + (section.type === "context" ? " is-context" : "");
      det.id = `sec-${section.id}`;
      // status is null outside diff mode, else "new" | "changed" | "unchanged"
      const status = diff.active ? (diff.sectionStatus.get(section.id) || "unchanged") : null;
      // diff mode overrides the default-open set: open changed/new, collapse unchanged
      if (status) det.open = (status === "new" || status === "changed");
      else if (OPEN_TYPES.has(section.type)) det.open = true;

      const sum = document.createElement("summary");
      sum.innerHTML = `<span class="sec-title">${escapeHtml(section.title)}</span>`;
      if (status === "new" || status === "changed") {
        sum.innerHTML += ` <span class="badge badge-diff">${status === "new" ? "New" : "Changed"}</span>`;
      }
      if (section.type === "risks" && section.itemCount) {
        sum.innerHTML += ` <span class="badge badge-risk">${section.itemCount}</span>`;
      }
      det.appendChild(sum);

      const body = document.createElement("div");
      body.className = "sec-body";
      let isCards = false;

      if (section.type === "decisions") {
        const { items, preamble } = parseDecisions(section.body);
        if (items.length) {
          isCards = true;
          if (preamble) {
            const pre = document.createElement("div");
            pre.innerHTML = md(preamble);
            body.appendChild(pre);
          }
          // changed Decisions section: highlight cards whose signature is absent from prev
          const prevSigs = status === "changed" ? diff.prevDecisionSigs.get(section.id) : null;
          items.forEach((it, i) => {
            const card = renderDecisionCard(it, i + 1);
            if (prevSigs && !prevSigs.has(decisionSig(it))) card.classList.add("card-changed");
            body.appendChild(card);
          });
        }
      }
      if (!isCards) {
        body.innerHTML = md(section.body); // shape-detection fallback: render as markdown
      }
      det.appendChild(body);
      return { det, bodyEl: body, isCards };
    }

    function highlightCode(root) {
      root.querySelectorAll("pre code").forEach((el) => {
        if (el.classList.contains("language-mermaid")) return; // rendered as a diagram instead
        window.hljs.highlightElement(el);
      });
    }

    async function renderMermaid(root) {
      const nodes = [];
      root.querySelectorAll("pre code.language-mermaid").forEach((code) => {
        const div = document.createElement("div");
        div.className = "mermaid";
        div.textContent = code.textContent;
        code.closest("pre").replaceWith(div);
        nodes.push(div);
      });
      if (nodes.length) {
        try {
          // suppressErrors keeps a single bad fence from aborting the batch — valid sibling
          // fences still render; the failing one stays as its (un-rendered) source text.
          await mermaid.run({ nodes, suppressErrors: true });
        } catch (err) {
          console.error("mermaid render error", err);
        }
      }
    }

    async function init() {
      const res = await fetch("/api/plan");
      if (!res.ok) throw new Error(`/api/plan HTTP ${res.status}`);
      const { id, markdown, lang, prevMarkdown } = await res.json();
      if (lang === "ja") {
        SWITCH_MSG = "この Decision を Alternative に切り替える";
        DIFF_BANNER = (n, removed) => `🔍 前回レビューから ${n} 個のセクションが変更・追加されました${removed ? `（削除 ${removed} 件）` : ""} — 変更箇所を以下にハイライト`;
        DIFF_BANNER_NONE = "🔍 前回レビューからセクションの変更はありません";
        KBD_HINT = "<kbd>a</kbd> 承認 · <kbd>r</kbd> 変更を依頼 · <kbd>⌘/Ctrl+↵</kbd> 送信";
      }
      document.getElementById("kbd-hint").innerHTML = KBD_HINT;

      let { preamble, sections } = parseSections(markdown);
      if (!sections.length) sections = [{ title: "Plan", type: "other", id: "plan", body: markdown }];

      // diff mode: only on a revise re-launch where serve.mjs shipped a prev plan
      if (typeof prevMarkdown === "string" && prevMarkdown.trim()) buildDiff(prevMarkdown, sections);

      const ovSection = sections.find((s) => s.type === "overview");
      const ov = parseOverview(ovSection ? ovSection.body : "");
      const risksSection = sections.find((s) => s.type === "risks");
      const riskCount = risksSection ? countListItems(risksSection.body) : 0;
      if (risksSection) risksSection.itemCount = riskCount; // reused by the section badge below
      renderHeader(ov, id, riskCount);
      renderDiffBanner();
      renderNav(sections);

      const planEl = document.getElementById("plan");
      renderPreamble(preamble, planEl);

      const bodyRefs = [];
      for (const s of sections) {
        const { det, bodyEl, isCards } = renderSection(s);
        planEl.appendChild(det);
        bodyRefs.push({ bodyEl, section: s, isCards });
      }

      // Run highlight + mermaid over the whole container first (mermaid replaces the
      // <pre> fence with a .mermaid div), then attach per-element comments so the comment
      // affordances land on stable rendered blocks (decision cards carry their own).
      highlightCode(planEl);
      await renderMermaid(planEl);
      for (const r of bodyRefs) if (!r.isCards) attachElementComments(r.bodyEl, r.section.id);
    }

    document.querySelectorAll(".decision-radio").forEach((radio) => {
      radio.addEventListener("change", () => selectDecision(radio.value));
    });

    document.getElementById("send-btn").addEventListener("click", submit);

    // Focus-independent keyboard shortcuts. macOS Full Keyboard Access (off by
    // default) makes Chrome exclude the decision radios and Send button from Tab
    // order, so a/r/⌘|Ctrl+Enter are the reliable keyboard path regardless.
    document.addEventListener("keydown", (e) => {
      if (e.isComposing) return;                                            // mid-IME (e.g. Japanese) — don't hijack
      if (document.getElementById("app").classList.contains("submitted")) return; // gate already sent
      // Submit chord: Cmd/Ctrl+Enter, works anywhere including a comment field.
      // Bare Enter is intentionally NOT bound — it must keep toggling <details>
      // summaries and activating focused buttons/links natively.
      if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
        if (state.decision) { e.preventDefault(); submit(); }
        return;
      }
      // Decision shortcuts: bare a/r, only outside text-entry fields and unmodified.
      const active = document.activeElement;
      const tag = active ? active.tagName : "";
      if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
      if (e.metaKey || e.ctrlKey || e.altKey || e.shiftKey) return;
      if (e.key === "a") { e.preventDefault(); selectDecision("approve"); }
      else if (e.key === "r") { e.preventDefault(); selectDecision("revise"); }
    });

    let submitting = false; // re-entry guard: the button is disabled on click, but the keydown path is not
    async function submit() {
      if (submitting || !state.decision) return;
      submitting = true;
      const comments = effectiveComments();
      const sendBtn = document.getElementById("send-btn");
      const status = document.getElementById("status");
      sendBtn.disabled = true;
      status.textContent = "";
      try {
        const res = await fetch("/api/submit", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ decision: state.decision, comments }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        // `submitting` stays true on success (not reset) — the "submitted" class added
        // here is the keydown guard's first early-return, so re-entry can't slip through.
        document.getElementById("app").classList.add("submitted");
        document.getElementById("done").hidden = false;
        document.getElementById("bar").style.display = "none";
        document.getElementById("done").scrollIntoView({ behavior: "smooth" });
      } catch (err) {
        submitting = false; // allow a retry after a failed POST
        sendBtn.disabled = false;
        status.textContent = `Failed to send: ${err.message}`;
      }
    }

    init().catch((err) => {
      document.getElementById("status").textContent = `Failed to load: ${err.message}`;
      console.error(err);
    });
  </script>
</body>
</html>
